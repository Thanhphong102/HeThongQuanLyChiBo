      /* ── FIX SIDEBAR LUÔN FULL HEIGHT khi chụp full-page screenshot ── */

      /* Sidebar kéo dài theo toàn bộ Layout thay vì chỉ 100vh */
      .ant-layout-sider {
        min-height: 100% !important;

      .ant-layout-sider-children {
        height: auto !important;

      }

      body, * {

      }
